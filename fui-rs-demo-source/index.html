<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EffinDom FUI-RS Demo</title>
    <style>
      :root { color-scheme: light dark; font-family: Inter, "Segoe UI", system-ui, -apple-system, sans-serif; }
      html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #0f172a; }
      .app-shell { position: fixed; inset: 0; overflow: hidden; }
      canvas { box-sizing: border-box; display: block; width: 100%; height: 100%; outline: none; }
      {{LOADING_OVERLAY_STYLES}}
    </style>
  </head>
  <body>
    <section class="app-shell" data-effindom-canvas-size-source>
      <canvas id="fui-canvas"></canvas>
      {{LOADING_OVERLAY_BODY}}
    </section>
    <script src="/effindom-runtime-config.js"></script>
    <script src="/bridge.js"></script>
    <script type="module" src="/harness.js"></script>
  </body>
</html>
